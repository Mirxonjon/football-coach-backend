services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football-api
    restart: unless-stopped
    # Linux host tarmog'i — container `localhost` = host. Postgres host'da ishlaydi.
    # ❗ `ports:` qatori ishlatilmaydi (host network'da port avtomatik ochiq).
    network_mode: host
    env_file:
      - .env
    environment:
      # Host'ning postgres'iga to'g'ridan-to'g'ri ulanish
      DB_HOST: localhost
      APP_HOST: 0.0.0.0
      APP_PORT: 4021
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
