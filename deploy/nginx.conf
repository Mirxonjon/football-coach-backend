# Football Coach API — Nginx reverse proxy
# Ubuntu server'da: /etc/nginx/sites-available/api.coaching-center.uz
# Symlink: sudo ln -s /etc/nginx/sites-available/api.coaching-center.uz /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx
# SSL: sudo certbot --nginx -d api.coaching-center.uz

server {
    listen 80;
    listen [::]:80;
    server_name api.coaching-center.uz;

    # Let's Encrypt avtomatik SSL qo'shganda quyidagilarni o'zi qo'yadi:
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/api.coaching-center.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.coaching-center.uz/privkey.pem;

    # Body limit — avatar/PDF upload uchun
    client_max_body_size 25M;

    # Long-running uploads/AI chat uchun
    proxy_read_timeout    300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass http://127.0.0.1:4021;
        proxy_http_version 1.1;

        # WebSocket / Upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Real-IP va Host
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
